# docker-compose.yml
# SmartCMS API — Local development environment
# Services: PHP 8.3 (Laravel), MySQL 8.0, Nginx, Node 20 (Vue 3)

services:

  # PHP Application — Laravel 11
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: smartcms_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    networks:
      - smartcms_network
    depends_on:
      mysql:
        condition: service_healthy

  # Nginx — Web Server
  nginx:
    image: nginx:alpine
    container_name: smartcms_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - smartcms_network
    depends_on:
      - app

  # MySQL 8.0 — Database
  mysql:
    image: mysql:8.0
    container_name: smartcms_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-smartcms}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_USER: ${DB_USERNAME:-smartcms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - smartcms_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Node 22 — Vue 3 Frontend (Sprint 4)
  # ─────────────────────────────────────────
  node:
    image: node:22-alpine
    container_name: smartcms_node
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    networks:
      - smartcms_network
    profiles:
      - frontend # Only starts when you explicitly need it
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

networks:
  smartcms_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
